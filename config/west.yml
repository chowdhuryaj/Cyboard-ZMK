manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: chowdhuryaj
      url-base: https://github.com/chowdhuryaj
    - name: urob
      url-base: https://github.com/urob

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    - name: zmk-keyboards
      remote: chowdhuryaj
      repo-path: Cyboard-ZMK-keyboards
      revision: main
      import: config/west.yml

    - name: zmk-adaptive-key
      remote: urob
      revision: main
      path: modules/zmk/adaptive-key

  self:
    path: config
